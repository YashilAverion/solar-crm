<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Installation - Ares Energy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-dark: #090d16;
            --surface-dark: #121824;
            --border-dark: #1e293b;
            --primary: #1c3557;
            --accent: #e8681e;
            --accent-hover: #d05a14;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #111a2e, var(--bg-dark));
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(18, 24, 36, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-wrap {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 2px;
            font-weight: 800;
        }

        .logo-subtitle {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-light);
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Form styling */
        .form-wrap {
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 576px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input {
            height: 44px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 0 16px;
            font-size: 14px;
            color: var(--text-light);
            outline: none;
            transition: all 0.3s ease;
        }

        .field input:focus {
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(232, 104, 30, 0.15);
        }

        .btn-track {
            width: 100%;
            height: 46px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(232, 104, 30, 0.3);
        }

        .btn-track:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(232, 104, 30, 0.4);
        }

        .btn-track:active {
            transform: translateY(0);
        }

        /* Results / Timeline Styling */
        .results-wrap {
            display: none;
            margin-top: 35px;
            border-top: 1px solid var(--border-dark);
            padding-top: 30px;
            animation: fadeIn 0.4s ease-out;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid var(--border-dark);
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .meta-val {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
        }

        /* Timeline Components */
        .timeline {
            position: relative;
            padding-left: 36px;
            list-style: none;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 6px;
            bottom: 6px;
            width: 3px;
            background: var(--border-dark);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 28px;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-badge {
            position: absolute;
            left: -36px;
            top: 2px;
            width: 27px;
            height: 27px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 3px solid var(--border-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .timeline-content {
            padding-left: 10px;
        }

        .timeline-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 3px;
        }

        .timeline-desc {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Completed State */
        .timeline-item.completed .timeline-badge {
            background: var(--success);
            border-color: var(--success);
        }

        .timeline-item.completed .timeline-badge::after {
            content: '✓';
            color: #fff;
            font-size: 12px;
            font-weight: 800;
        }

        .timeline-item.completed .timeline-title {
            color: var(--text-light);
        }

        /* Active / Current State */
        .timeline-item.current .timeline-badge {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 0 5px rgba(232, 104, 30, 0.25);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 2px rgba(232, 104, 30, 0.2); }
            100% { box-shadow: 0 0 0 8px rgba(232, 104, 30, 0.45); }
        }

        .timeline-item.current .timeline-title {
            color: var(--accent);
        }

        .timeline-item.current .timeline-desc {
            color: var(--text-light);
        }

        /* Link back to portal / contact info */
        .portal-link {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .portal-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .portal-link a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="/responsive.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-wrap">
                <span class="logo-title">Ares Energy</span>
                <span class="logo-subtitle">Project Tracker</span>
            </div>
            <p>Enter your project details below to track your solar installation progress live.</p>
        </div>

        <div class="form-wrap">
            <form id="trackForm" onsubmit="trackProject(event)">
                <div class="form-grid">
                    <div class="field">
                        <label for="projectNum">Project Number</label>
                        <input type="text" id="projectNum" placeholder="e.g. AR1001" required autocomplete="off">
                    </div>
                    <div class="field">
                        <label for="phoneNum">Mobile Number</label>
                        <input type="text" id="phoneNum" placeholder="e.g. 04xxxxxxxx" required autocomplete="off">
                    </div>
                </div>
                <button type="submit" class="btn-track" id="btnSubmit">Track Progress</button>
            </form>
        </div>

        <div class="results-wrap" id="resultsWrap">
            <div class="project-meta">
                <div class="meta-item">
                    <span class="meta-label">Customer</span>
                    <span class="meta-val" id="custName">-</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Project No</span>
                    <span class="meta-val" id="projNo">-</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">System Size</span>
                    <span class="meta-val" id="sysSize">-</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Last Updated</span>
                    <span class="meta-val" id="updatedAt">-</span>
                </div>
            </div>

            <ul class="timeline" id="timelineList">
                <!-- Milestones will build dynamically -->
            </ul>
        </div>

        <div class="portal-link">
            Need help? Contact support at <a href="mailto:support@aresenergy.com.au">support@aresenergy.com.au</a>
        </div>
    </div>

    <script>
        async function trackProject(e) {
            e.preventDefault();
            const projectNo = document.getElementById('projectNum').value.trim();
            const phone = document.getElementById('phoneNum').value.trim();
            const btn = document.getElementById('btnSubmit');

            if (!projectNo || !phone) return;

            btn.disabled = true;
            btn.innerText = 'Searching...';

            try {
                const res = await fetch(`/api/customer/track/${encodeURIComponent(projectNo)}?phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if (!res.ok) {
                    Swal.fire({
                        title: 'Lookup Failed',
                        text: data.error || 'Project not found or incorrect mobile number.',
                        icon: 'error',
                        confirmButtonColor: '#e8681e'
                    });
                    document.getElementById('resultsWrap').style.display = 'none';
                    return;
                }

                // Populate Meta
                document.getElementById('custName').innerText = data.customer_name || 'N/A';
                document.getElementById('projNo').innerText = data.project_number || 'N/A';
                document.getElementById('sysSize').innerText = data.system_size ? `${data.system_size} kW` : 'N/A';
                
                // Format date nicely
                if (data.updated_at) {
                    const dateObj = new Date(data.updated_at);
                    document.getElementById('updatedAt').innerText = dateObj.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
                } else {
                    document.getElementById('updatedAt').innerText = 'Recent';
                }

                // Render Timeline List
                const timeline = document.getElementById('timelineList');
                timeline.innerHTML = '';

                data.steps.forEach(step => {
                    const li = document.createElement('li');
                    li.className = `timeline-item ${step.status}`;
                    li.innerHTML = `
                        <div class="timeline-badge"></div>
                        <div class="timeline-content">
                            <div class="timeline-title">${step.name}</div>
                            <div class="timeline-desc">${step.description}</div>
                        </div>
                    `;
                    timeline.appendChild(li);
                });

                document.getElementById('resultsWrap').style.display = 'block';
                document.getElementById('resultsWrap').scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                Swal.fire({
                    title: 'System Error',
                    text: 'Could not connect to tracking server. Please try again later.',
                    icon: 'error',
                    confirmButtonColor: '#e8681e'
                });
            } finally {
                btn.disabled = false;
                btn.innerText = 'Track Progress';
            }
        }
    </script>
    <script src="/australian-timezones.js"></script>
    <script src="/responsive.js"></script>
</body>
</html>
