<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Activity Logs - Ares CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #1c2b3a; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h2 { color: #1c3557; margin-top: 0; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 20px; }
        input { padding: 8px 12px; border: 1px solid #dde3ed; border-radius: 6px; width: 300px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-weight: 600; color: #6b7a8d; text-transform: uppercase; }
        .badge { background: #eef2f8; color: #1c3557; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .pagination { display: flex; gap: 10px; align-items: center; justify-content: flex-end; margin-top: 20px; font-size: 13px; }
        .pagination button { padding: 6px 12px; border: 1px solid #dde3ed; background: #fff; cursor: pointer; border-radius: 4px; }
        .pagination button:hover { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Global System Activity Logs</h2>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search logs (User, Action, Module)..." onkeyup="debounceSearch()">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>User</th>
                    <th>Action Type</th>
                    <th>Module</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr><td colspan="5" style="text-align: center;">Loading logs...</td></tr>
            </tbody>
        </table>
        <div class="pagination">
            <button onclick="changePage(-1)">Previous</button>
            <span id="pageIndicator">Page 1</span>
            <button onclick="changePage(1)">Next</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let searchTimer;

        async function fetchLogs() {
            const query = document.getElementById('searchInput').value;
            const tbody = document.getElementById('logsTableBody');
            
            try {
                const res = await fetch(`/admin/activity-logs?page=${currentPage}&limit=50&search=${encodeURIComponent(query)}`);
                if (!res.ok) throw new Error('Unauthorized');
                const response = await res.json();
                
                tbody.innerHTML = '';
                if (response.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No logs found.</td></tr>';
                    return;
                }

                response.data.forEach(log => {
                    const tr = document.createElement('tr');
                    
                    // Format date (assuming SQLite datetime format)
                    const d = new Date(log.timestamp);
                    const dateStr = d.toLocaleString('en-AU', { hour12: true, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                    tr.innerHTML = `
                        <td>${dateStr}</td>
                        <td style="font-weight:600;">${log.user_name}</td>
                        <td><span class="badge">${log.action_type}</span></td>
                        <td style="color:#6b7a8d;">${log.from_module}</td>
                        <td style="color:#475569;">${log.details}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                document.getElementById('pageIndicator').innerText = `Page ${currentPage} (Total: ${response.total})`;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Failed to load logs. Ensure you are logged in as an Admin.</td></tr>';
            }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                currentPage = 1;
                fetchLogs();
            }, 400);
        }

        function changePage(direction) {
            if (currentPage + direction < 1) return;
            currentPage += direction;
            fetchLogs();
        }

        fetchLogs();
    </script>
    <script src="/australian-timezones.js"></script>
</body>
</html>
